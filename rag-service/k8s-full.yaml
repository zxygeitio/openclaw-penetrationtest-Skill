apiVersion: v1
kind: ConfigMap
metadata:
  name: rag-config
  namespace: default
data:
  MODEL_PATH: "/data/models/qwen/Qwen2-0___5B"
  BOOKS_DIR: "/data/books"
  PORT: "8000"
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: rag-data-pvc
  namespace: default
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 20Gi
  storageClassName: nfs-client
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rag-service
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rag-service
  template:
    metadata:
      labels:
        app: rag-service
    spec:
      containers:
      - name: rag
        image: python:3.11-slim
        command: ["/bin/bash", "-c"]
        args:
        - |
          pip install --no-cache-dir transformers torch sentence-transformers flask pypdf werkzeug > /dev/null 2>&1
          cd /app
          cp /data/rag_simple.py .
          python3 rag_simple.py
        ports:
        - containerPort: 8000
        resources:
          requests:
            memory: "6Gi"
            cpu: "4"
          limits:
            memory: "8Gi"
            cpu: "6"
        volumeMounts:
        - name: data
          mountPath: /data
        - name: app
          mountPath: /app
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: rag-data-pvc
      - name: app
        configMap:
          name: rag-config
---
apiVersion: v1
kind: Service
metadata:
  name: rag-service
  namespace: default
spec:
  type: NodePort
  ports:
  - port: 8000
    targetPort: 8000
    protocol: TCP
    nodePort: 30080
  selector:
    app: rag-service
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: rag-hpa
  namespace: default
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: rag-service
  minReplicas: 1
  maxReplicas: 3
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
