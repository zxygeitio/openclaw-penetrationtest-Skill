apiVersion: v1
kind: Pod
metadata:
  name: rag-node
  labels:
    app: rag
spec:
  hostNetwork: true
  dnsPolicy: ClusterFirstWithHostNet
  containers:
  - name: rag
    image: python:3.11-slim
    command: ["/bin/bash", "-c"]
    args:
    - |
      pip install --no-cache-dir transformers torch sentence-transformers flask pypdf werkzeug > /dev/null 2>&1
      cp /data/rag_simple.py /tmp/
      cd /tmp && python3 rag_simple.py
    ports:
    - containerPort: 8000
      hostPort: 8000
    resources:
      requests:
        memory: "4Gi"
        cpu: "2"
      limits:
        memory: "8Gi"
        cpu: "4"
    volumeMounts:
    - name: data
      mountPath: /data
    nodeName: k8s-worker01
  volumes:
  - name: data
    hostPath:
      path: /data
---
apiVersion: v1
kind: Service
metadata:
  name: rag-node-svc
spec:
  type: NodePort
  ports:
  - port: 8000
    targetPort: 8000
    nodePort: 30080
  selector:
    app: rag
