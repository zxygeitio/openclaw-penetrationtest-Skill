apiVersion: v1
kind: ConfigMap
metadata:
  name: rag-script
data:
  rag.py: |
    #!/usr/bin/env python3
    import os, uuid, threading
    from pathlib import Path
    from flask import Flask, request, jsonify
    from transformers import AutoModelForCausalLM, AutoTokenizer

    MODEL_PATH = '/data/models/qwen/Qwen2-0___5B'
    BOOKS_DIR = '/data/books'

    print('Loading model...')
    tokenizer = AutoTokenizer.from_pretrained(MODEL_PATH, trust_remote_code=True)
    model = AutoModelForCausalLM.from_pretrained(MODEL_PATH, trust_remote_code=True, device_map='auto')
    print('Model loaded!')

    app = Flask(__name__)
    tasks, documents = {}, []

    def load_documents():
        global documents
        documents = []
        from pypdf import PdfReader
        for file in Path(BOOKS_DIR).iterdir():
            try:
                if file.suffix.lower() == '.pdf':
                    reader = PdfReader(str(file))
                    text = '\n'.join([p.extract_text() for p in reader.pages])
                elif file.suffix.lower() in ['.txt', '.md']:
                    text = file.read_text(encoding='utf-8')
                else: continue
                chunks = [text[i:i+1000] for i in range(0, len(text), 800)]
                for i, chunk in enumerate(chunks):
                    if chunk.strip():
                        documents.append({'id': f'{file.name}_{i}', 'source': file.name, 'text': chunk})
            except: pass
        print(f'Loaded {len(documents)} chunks')

    @app.route('/health')
    def health(): return jsonify({'status': 'ok', 'documents': len(documents)})

    @app.route('/chat', methods=['POST'])
    def chat():
        q = request.json.get('question', '')
        inputs = tokenizer(q, return_tensors='pt').to(model.device)
        outputs = model.generate(**inputs, max_new_tokens=512)
        return jsonify({'answer': tokenizer.decode(outputs[0], skip_special_tokens=True)})

    @app.route('/chat/async', methods=['POST'])
    def chat_async():
        q = request.json.get('question', '')
        task_id = str(uuid.uuid4())
        tasks[task_id] = {'status': 'pending', 'question': q}
        return jsonify({'task_id': task_id, 'status': 'pending'})

    @app.route('/chat/task/<task_id>')
    def get_task(task_id): return jsonify(tasks.get(task_id, {'error': 'not found'}))

    if __name__ == '__main__':
        load_documents()
        app.run(host='0.0.0.0', port=8000)
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rag-cluster
spec:
  replicas: 2
  selector:
    matchLabels:
      app: rag-cluster
  template:
    metadata:
      labels:
        app: rag-cluster
    spec:
      containers:
      - name: rag
        image: python:3.11-slim
        command: ["/bin/bash", "-c"]
        args:
        - |
          pip install --no-cache-dir transformers torch flask pypdf werkzeug > /dev/null 2>&1
          cp /app/rag.py /tmp/rag.py
          python3 /tmp/rag.py
        ports:
        - containerPort: 8000
        resources:
          requests:
            memory: "4Gi"
            cpu: "2"
          limits:
            memory: "8Gi"
            cpu: "4"
        volumeMounts:
        - name: data
          mountPath: /data
        - name: script
          mountPath: /app
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: rag-data-pvc
      - name: script
        configMap:
          name: rag-script
---
apiVersion: v1
kind: Service
metadata:
  name: rag-cluster
spec:
  type: NodePort
  ports:
  - port: 8000
    targetPort: 8000
    nodePort: 30080
  selector:
    app: rag-cluster
